<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sling Juggler Pro</title>
    <style>
        body { margin: 0; background: #0f0c29; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00d2ff; pointer-events: none; text-shadow: 0 0 15px #00d2ff;
        }
        #score { font-size: 3rem; }
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px;
            border: 3px solid #ff0055; text-align: center; color: white; z-index: 100;
        }
        button {
            background: #ff0055; border: none; padding: 15px 40px;
            color: white; font-size: 1.5rem; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #ff0055; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div id="combo">COMBO x1</div>
    </div>

    <div id="menu">
        <h1 style="margin:0; color:#ff0055;">SLING JUGGLER</h1>
        <p>Grab balls & flick them up!<br>Don't let them hit the floor.</p>
        <button onclick="initGame()">START</button>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const menu = document.getElementById('menu');

    let balls = [];
    let score = 0;
    let gameRunning = false;
    let gravity = 0.25;
    let grabbedBall = null;
    let lastMousePos = { x: 0, y: 0 };
    let mouseVel = { x: 0, y: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Ball {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 35;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = -10;
            this.color = '#00d2ff';
            this.isGrabbed = false;
            this.trail = [];
        }

        update() {
            if (this.isGrabbed) {
                this.vx = 0;
                this.vy = 0;
            } else {
                this.vy += gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Wall Bounce
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -0.8;
                    this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
                }
            }

            // Update Trail
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 10) this.trail.shift();
        }

        draw() {
            // Draw Trail
            this.trail.forEach((t, i) => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, this.radius * (i/10), 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 210, 255, ${i/20})`;
                ctx.fill();
            });

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            
            // Visual feedback: Red if falling fast/near bottom, Gold if held
            if (this.isGrabbed) {
                ctx.fillStyle = '#ffcc00';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ffcc00';
            } else if (this.y > canvas.height * 0.7 && this.vy > 0) {
                ctx.fillStyle = '#ff0055';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff0055';
                // Slight shake effect
                this.x += Math.sin(Date.now()) * 2;
            } else {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
            }
            
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function spawnBall() {
        balls.push(new Ball(canvas.width / 2, canvas.height - 100));
    }

    function initGame() {
        score = 0;
        balls = [];
        gameRunning = true;
        menu.style.display = 'none';
        spawnBall();
        // Difficulty increase: add more balls over time
        setTimeout(spawnBall, 5000);
        setTimeout(spawnBall, 15000);
        update();
    }

    function handleInput(e) {
        if (!gameRunning) return;
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        const mouseX = t.clientX - rect.left;
        const mouseY = t.clientY - rect.top;

        if (e.type === 'touchstart' || e.type === 'mousedown') {
            balls.forEach(ball => {
                const dist = Math.hypot(ball.x - mouseX, ball.y - mouseY);
                if (dist < ball.radius * 2) {
                    ball.isGrabbed = true;
                    grabbedBall = ball;
                }
            });
        } 
        
        if ((e.type === 'touchmove' || e.type === 'mousemove') && grabbedBall) {
            mouseVel.x = mouseX - lastMousePos.x;
            mouseVel.y = mouseY - lastMousePos.y;
            grabbedBall.x = mouseX;
            grabbedBall.y = mouseY;
        }

        if (e.type === 'touchend' || e.type === 'mouseup') {
            if (grabbedBall) {
                grabbedBall.isGrabbed = false;
                grabbedBall.vx = mouseVel.x * 0.8;
                grabbedBall.vy = mouseVel.y * 0.8;
                
                if (grabbedBall.vy < -5) {
                    score += 10;
                    scoreEl.innerText = score;
                }
                grabbedBall = null;
            }
        }

        lastMousePos = { x: mouseX, y: mouseY };
    }

    window.addEventListener('mousedown', handleInput);
    window.addEventListener('mousemove', handleInput);
    window.addEventListener('mouseup', handleInput);
    window.addEventListener('touchstart', handleInput);
    window.addEventListener('touchmove', handleInput);
    window.addEventListener('touchend', handleInput);

    function update() {
        if (!gameRunning) return;
        ctx.fillStyle = 'rgba(15, 12, 41, 0.4)'; // Motion blur effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        balls.forEach((ball, index) => {
            ball.update();
            ball.draw();

            // Game Over Condition
            if (ball.y - ball.radius > canvas.height) {
                gameRunning = false;
                menu.style.display = 'block';
                menu.innerHTML = `<h1>DROPPED!</h1><p>Score: ${score}</p><button onclick="initGame()">RETRY</button>`;
            }
        });

        requestAnimationFrame(update);
    }
</script>
</body>
</html>
