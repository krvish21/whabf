<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Run: Battle Board</title>
    <style>
        body { 
            margin: 0; background: #1a1a1a; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; align-items: center;
        }
        #ui { margin-top: 20px; text-align: center; z-index: 10; }
        #status { font-size: 1.2rem; color: #ffcc00; margin-bottom: 10px; height: 30px; }
        canvas { background: #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 10px; }
        .controls { margin-top: 20px; }
        button { 
            background: #e63946; border: none; padding: 15px 40px; 
            color: white; font-size: 1.5rem; font-weight: bold; border-radius: 10px;
            box-shadow: 0 5px #900; active-transform: translateY(4px);
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #900; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Player 1's Turn</div>
        <div id="dice-val" style="font-size: 3rem; font-weight: bold;">?</div>
    </div>

    <canvas id="board"></canvas>

    <div class="controls">
        <button onclick="rollDice()">ROLL DICE</button>
    </div>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const diceEl = document.getElementById('dice-val');

    let size = Math.min(window.innerWidth - 40, 400);
    canvas.width = size;
    canvas.height = size;

    const totalTiles = 32;
    const fatalTiles = [5, 12, 19, 26]; // Indices of death spots
    
    let players = [
        { id: 1, pos: 0, color: '#4cc9f0', label: 'P1' },
        { id: 2, pos: 0, color: '#f72585', label: 'P2' }
    ];
    let turn = 0;
    let isMoving = false;

    function getTilePos(index) {
        // Arranges tiles in a square loop
        const side = totalTiles / 4;
        const spacing = size / (side + 1);
        let x, y;

        if (index < side) { // Top
            x = spacing + (index * spacing);
            y = spacing;
        } else if (index < side * 2) { // Right
            x = size - spacing;
            y = spacing + ((index - side) * spacing);
        } else if (index < side * 3) { // Bottom
            x = size - spacing - ((index - side * 2) * spacing);
            y = size - spacing;
        } else { // Left
            x = spacing;
            y = size - spacing - ((index - side * 3) * spacing);
        }
        return { x, y };
    }

    function drawBoard() {
        ctx.clearRect(0, 0, size, size);

        // Draw Tiles
        for (let i = 0; i < totalTiles; i++) {
            const { x, y } = getTilePos(i);
            const isFatal = fatalTiles.includes(i);
            
            ctx.beginPath();
            ctx.fillStyle = isFatal ? '#900' : '#333';
            ctx.strokeStyle = '#555';
            ctx.rect(x - 18, y - 18, 36, 36);
            ctx.fill();
            ctx.stroke();

            if (isFatal) {
                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.fillText("💀", x - 8, y + 5);
            }
        }

        // Draw Players
        players.forEach((p, idx) => {
            const { x, y } = getTilePos(p.pos);
            const offset = idx * 5; // Prevent total overlapping
            
            ctx.beginPath();
            ctx.arc(x + offset, y + offset, 12, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = "white";
            ctx.font = "bold 10px Arial";
            ctx.fillText(p.label, x + offset - 6, y + offset + 4);
        });
    }

    async function rollDice() {
        if (isMoving) return;
        isMoving = true;

        const roll = Math.floor(Math.random() * 6) + 1;
        diceEl.innerText = roll;
        
        let p = players[turn];
        
        // Move animation logic
        for (let i = 0; i < roll; i++) {
            p.pos++;
            if (p.pos >= totalTiles) {
                victory(p);
                return;
            }
            drawBoard();
            await new Promise(r => setTimeout(r, 200));
        }

        checkLogic(p);
    }

    function checkLogic(p) {
        // 1. Check Fatal Spots
        if (fatalTiles.includes(p.pos)) {
            statusEl.innerText = `DEAD! P${p.id} back to start!`;
            p.pos = 0;
        } 
        
        // 2. Check Attacks
        let opponent = players.find(other => other.id !== p.id && other.pos === p.pos);
        if (opponent && p.pos !== 0) {
            statusEl.innerText = `ATTACK! P${p.id} kicked P${opponent.id}!`;
            opponent.pos = Math.max(0, opponent.pos - 5);
        }

        // Switch turn
        turn = (turn + 1) % players.length;
        if (statusEl.innerText.indexOf('!') === -1) {
            statusEl.innerText = `Player ${players[turn].id}'s Turn`;
        }
        
        isMoving = false;
        drawBoard();
    }

    function victory(p) {
        statusEl.innerText = `PLAYER ${p.id} WINS!`;
        diceEl.innerText = "🏆";
        // Reset after 3 seconds
        setTimeout(() => {
            players.forEach(player => player.pos = 0);
            turn = 0;
            isMoving = false;
            statusEl.innerText = "Player 1's Turn";
            drawBoard();
        }, 3000);
    }

    drawBoard();
</script>
</body>
</html>
