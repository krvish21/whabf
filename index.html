<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Juggler</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .score-board { font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px #4cc9f0; }
        canvas { display: block; }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #4cc9f0;
        }
        button {
            background: #4cc9f0;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 1.2rem;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-board">SCORE: <span id="score">0</span></div>
    </div>

    <div id="msg">
        <h1>Neon Juggler</h1>
        <p>Tap the Left/Right side when balls glow!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    let score = 0;
    let balls = [];
    let gameActive = false;
    const gravity = 0.15;
    const strikeZoneY = 0; // Calculated on resize

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Ball {
        constructor(side) {
            this.radius = 25;
            this.reset(side);
        }

        reset(side) {
            this.side = side; // 0 for left, 1 for right
            this.x = side === 0 ? canvas.width * 0.25 : canvas.width * 0.75;
            this.y = -50;
            this.vy = 2;
            this.vx = 0;
            this.isGlowing = false;
        }

        update() {
            this.vy += gravity;
            this.y += this.vy;

            // Highlight ball when in the strike zone (bottom 25% of screen)
            if (this.y > canvas.height * 0.7 && this.y < canvas.height * 0.9) {
                this.isGlowing = true;
            } else {
                this.isGlowing = false;
            }

            // Fail condition
            if (this.y > canvas.height) {
                gameOver();
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            
            if (this.isGlowing) {
                ctx.fillStyle = '#4ee44e';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#4ee44e';
            } else {
                ctx.fillStyle = '#4cc9f0';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#4cc9f0';
            }
            
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow for next draw
            ctx.closePath();
        }

        toss() {
            if (this.isGlowing) {
                this.vy = -12; // Throw up
                // Cross over to the other side
                this.side = this.side === 0 ? 1 : 0;
                const targetX = this.side === 0 ? canvas.width * 0.25 : canvas.width * 0.75;
                this.vx = (targetX - this.x) / 60; // Smooth transition
                
                score++;
                scoreEl.innerText = score;
                return true;
            }
            return false;
        }
    }

    function startGame() {
        score = 0;
        scoreEl.innerText = score;
        balls = [new Ball(0)];
        // Add a second ball after a delay
        setTimeout(() => { if(gameActive) balls.push(new Ball(1)) }, 2000);
        
        gameActive = true;
        msgEl.style.display = 'none';
        animate();
    }

    function gameOver() {
        gameActive = false;
        msgEl.style.display = 'block';
        msgEl.innerHTML = `<h1>GAME OVER</h1><p>Final Score: ${score}</p><button onclick="startGame()">TRY AGAIN</button>`;
    }

    // Input Handling
    window.addEventListener('touchstart', (e) => {
        if (!gameActive) return;
        const touchX = e.touches[0].clientX;
        const sideClicked = touchX < canvas.width / 2 ? 0 : 1;

        balls.forEach(ball => {
            if (ball.side === sideClicked) {
                ball.toss();
            }
        });
    });

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Strike Zones
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.2);

        balls.forEach(ball => {
            ball.x += ball.vx;
            ball.update();
            ball.draw();
        });

        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
