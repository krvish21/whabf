<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE CATHARSIS</title>
    <style>
        body {
            margin: 0;
            background: #1a0000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #4a0000, #000);
            transition: background 0.2s;
        }

        .main-target {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            user-select: none;
            cursor: pointer;
            z-index: 10;
        }

        .fragment {
            position: absolute;
            pointer-events: none;
            font-size: 40px;
            z-index: 5;
            transition: transform 0.6s ease-out, opacity 0.6s;
        }

        .shout {
            position: absolute;
            color: #ff3333;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
            text-shadow: 2px 2px #000;
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ffd700;
            pointer-events: none;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 12px; letter-spacing: 2px;">TOTAL PENANCE</div>
        <div id="score" style="font-size: 40px;">0</div>
    </div>

    <div id="container">
        <div id="boss" class="main-target">👨‍Settings</div>
    </div>

    <script>
        const container = document.getElementById('container');
        const boss = document.getElementById('boss');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const insults = ["I'M TRASH", "MY BAD", "SO STUPID", "UGH ME", "SORRY!", "PLEASE", "HEHE?", "FIX ME"];
        const faces = ["💀", "🤡", "💩", "跪", "🙇‍♂️"];

        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                const frag = document.createElement('div');
                frag.className = 'fragment';
                frag.innerText = faces[Math.floor(Math.random() * faces.length)];
                frag.style.left = x + 'px';
                frag.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 150;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                container.appendChild(frag);

                requestAnimationFrame(() => {
                    frag.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg)`;
                    frag.style.opacity = '0';
                });

                setTimeout(() => frag.remove(), 600);
            }
        }

        function spawnText(x, y) {
            const text = document.createElement('div');
            text.className = 'shout';
            text.innerText = insults[Math.floor(Math.random() * insults.length)];
            text.style.left = (x - 50) + 'px';
            text.style.top = (y - 20) + 'px';
            text.style.fontSize = (20 + Math.random() * 30) + 'px';
            
            container.appendChild(text);
            
            let pos = 0;
            const interval = setInterval(() => {
                pos += 4;
                text.style.transform = `translateY(-${pos}px)`;
                text.style.opacity = 1 - (pos/100);
                if (pos >= 100) {
                    clearInterval(interval);
                    text.remove();
                }
            }, 16);
        }

        function handleHit(e) {
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            const x = touch.clientX;
            const y = touch.clientY;

            score++;
            scoreEl.innerText = score;

            // Screen Shake & Flash
            container.style.background = '#ff0000';
            setTimeout(() => { container.style.background = 'radial-gradient(circle, #4a0000, #000)'; }, 50);

            // Haptics
            if (navigator.vibrate) navigator.vibrate([50]);

            // Visuals
            createExplosion(x, y);
            spawnText(x, y);

            // Boss reaction
            boss.style.transform = `translate(-50%, -50%) scale(${0.8 + Math.random() * 0.4})`;
        }

        container.addEventListener('touchstart', handleHit);
        container.addEventListener('mousedown', handleHit);
    </script>
</body>
</html>
