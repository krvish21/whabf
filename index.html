
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BF BOUNCE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a0000; touch-action: none; }
        canvas { display: block; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 0, 0, 0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            color: #ff3333; font-family: sans-serif; text-align: center;
        }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ff3333; pointer-events: none; z-index: 10; font-family: sans-serif;
        }
        .btn {
            padding: 20px 40px; background: #ff3333; color: white; border: none;
            border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>BABE'S RAGE ROOM</h1>
        <p>TAP THE BOYFRIEND TO LAUNCH HIM</p>
        <button class="btn" onclick="startGame()">START VENTING</button>
    </div>

    <div id="ui">
        <div id="status">MILDLY ANNOYED</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');

        let active = false;
        let rage = 0;
        let shake = 0;
        let floatingTexts = [];

        const bf = {
            x: 0, y: 0, vx: 0, vy: 0,
            size: 80, rotation: 0, rv: 0
        };

        function startGame() {
            overlay.style.display = 'none';
            active = true;
            resize();
            bf.x = canvas.width / 2;
            bf.y = canvas.height / 2;
            loop();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);

        function handleInput(e) {
            if (!active) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const dx = bf.x - clientX;
            const dy = bf.y - clientY;
            const dist = Math.hypot(dx, dy);

            // Hit detection (larger for phone fingers)
            if (dist < 120) {
                bf.vx = (bf.x - clientX) * 0.5 + (Math.random() - 0.5) * 20;
                bf.vy = (bf.y - clientY) * 0.5 - 20;
                bf.rv = (Math.random() - 0.5) * 0.4;
                
                rage = Math.min(rage + 15, 100);
                shake = 10;
                if (navigator.vibrate) navigator.vibrate(50);

                floatingTexts.push({
                    x: bf.x, y: bf.y, 
                    text: ["SORRY!", "MY BAD!", "YOU'RE RIGHT!", "OUCH!"][Math.floor(Math.random()*4)], 
                    life: 1.0 
                });
            }
        }

        function loop() {
            if (!active) return;

            // Physics
            bf.vx *= 0.97;
            bf.vy += 0.8; // Gravity
            bf.x += bf.vx;
            bf.y += bf.vy;
            bf.rotation += bf.rv;

            // Bounces
            if (bf.x < 40) { bf.x = 40; bf.vx *= -0.7; }
            if (bf.x > canvas.width - 40) { bf.x = canvas.width - 40; bf.vx *= -0.7; }
            if (bf.y > canvas.height - 40) { bf.y = canvas.height - 40; bf.vy *= -0.5; bf.rv *= 0.8; }
            if (bf.y < 40) { bf.y = 40; bf.vy *= -0.7; }

            // State
            rage = Math.max(0, rage - 0.3);
            shake *= 0.9;

            // Draw
            ctx.fillStyle = `rgb(${26 + rage * 2}, 0, 0)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (shake > 0.1) ctx.translate(Math.random()*shake, Math.random()*shake);
            ctx.translate(bf.x, bf.y);
            ctx.rotate(bf.rotation);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "80px serif";
            ctx.fillText(rage > 60 ? "😵" : "🙇‍♂️", 0, 0);
            ctx.restore();

            floatingTexts.forEach((t, i) => {
                ctx.fillStyle = `rgba(255, 215, 0, ${t.life})`;
                ctx.font = "bold 20px sans-serif";
                ctx.fillText(t.text, t.x, t.y - 50);
                t.life -= 0.02;
                if (t.life <= 0) floatingTexts.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
        canvas.addEventListener('mousedown', handleInput);
    </script>
</body>
</html>
