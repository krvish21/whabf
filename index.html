<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Night Intersection</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
        }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        input[type=range] { width: 150px; cursor: pointer; }
        .hint { font-size: 11px; color: #00ffcc; margin-top: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="control-group">
            <label>TRAFFIC DENSITY</label>
            <input type="range" id="densitySlider" min="0.005" max="0.1" step="0.005" value="0.03">
        </div>
        <div class="hint">Tap/Click cars to emergency brake!</div>
    </div>

    <canvas id="simCanvas"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const densitySlider = document.getElementById('densitySlider');

let width, height;
const LANE_WIDTH = 70;
const CAR_WIDTH = 35;
const CAR_LENGTH = 60;
const MAX_SPEED = 3;

let cars = [];
let explosions = [];
let trafficDensity = 0.03;

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', resize);
resize();

class Car {
    constructor(x, y, dir) {
        this.x = x;
        this.y = y;
        this.dir = dir; // 0:R, 1:D, 2:L, 3:U
        this.speed = MAX_SPEED;
        this.color = `hsl(${Math.random() * 360}, 60%, 50%)`;
        this.isBraking = false;
        this.isCrashed = false;
        this.manualStop = false;
        this.id = Math.random();
    }

    update() {
        if (this.isCrashed) return;

        // Reset states
        this.isBraking = false;
        let targetSpeed = MAX_SPEED;

        if (this.manualStop) {
            targetSpeed = 0;
            this.isBraking = true;
        } else {
            // "Smart" Look-ahead
            for (let other of cars) {
                if (other === this || other.isCrashed) continue;

                const dx = other.x - this.x;
                const dy = other.y - this.y;
                let dist = Infinity;

                // Check cars in front (same lane)
                if (this.dir === 0 && dx > 0 && Math.abs(dy) < 20) dist = dx;
                if (this.dir === 1 && dy > 0 && Math.abs(dx) < 20) dist = dy;
                if (this.dir === 2 && dx < 0 && Math.abs(dy) < 20) dist = -dx;
                if (this.dir === 3 && dy < 0 && Math.abs(dx) < 20) dist = -dy;

                // Check for intersection yield (simple priority)
                const inInstersection = Math.abs(this.x - width/2) < LANE_WIDTH && Math.abs(this.y - height/2) < LANE_WIDTH;
                if (!inInstersection) {
                   const approachDist = 120;
                   if (this.dir === 0 && Math.abs(this.x - (width/2 - LANE_WIDTH)) < approachDist) {
                       if (other.dir === 1 || other.dir === 3) {
                           if (Math.abs(other.x - width/2) < LANE_WIDTH && Math.abs(other.y - height/2) < 150) dist = Math.min(dist, 100);
                       }
                   }
                   // Add similar logic for other directions... (simplified for brevity)
                }

                if (dist < 150) {
                    this.isBraking = true;
                    targetSpeed = Math.min(targetSpeed, dist < 60 ? 0 : 1);
                }
            }
        }

        // Smooth acceleration/deceleration
        if (this.speed > targetSpeed) this.speed -= 0.15;
        else if (this.speed < targetSpeed) this.speed += 0.05;
        if (this.speed < 0) this.speed = 0;

        // Move
        if (this.dir === 0) this.x += this.speed;
        if (this.dir === 1) this.y += this.speed;
        if (this.dir === 2) this.x -= this.speed;
        if (this.dir === 3) this.y -= this.speed;

        // Collision Check
        for (let other of cars) {
            if (other === this || this.isCrashed || other.isCrashed) continue;
            const dist = Math.hypot(this.x - other.x, this.y - other.y);
            if (dist < 40) {
                this.isCrashed = true;
                other.isCrashed = true;
                this.speed = 0;
                other.speed = 0;
                explosions.push({x: (this.x + other.x)/2, y: (this.y + other.y)/2, r: 10, life: 1.0});
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.dir * Math.PI) / 2);

        // Headlight Cones
        if (!this.isCrashed) {
            const grad = ctx.createRadialGradient(20, 0, 5, 120, 0, 100);
            grad.addColorStop(0, 'rgba(255, 255, 220, 0.3)');
            grad.addColorStop(1, 'rgba(255, 255, 220, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(150, -50);
            ctx.lineTo(150, 50);
            ctx.fill();
        }

        // Car Body
        ctx.fillStyle = this.manualStop ? '#fff' : this.color;
        ctx.shadowBlur = this.isCrashed ? 0 : 10;
        ctx.shadowColor = this.color;
        ctx.fillRect(-CAR_LENGTH/2, -CAR_WIDTH/2, CAR_LENGTH, CAR_WIDTH);
        
        // Windows
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(-10, -CAR_WIDTH/2 + 5, 25, CAR_WIDTH - 10);

        // Brake Lights
        if (this.isBraking || this.isCrashed) {
            ctx.fillStyle = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'red';
            ctx.fillRect(-CAR_LENGTH/2, -CAR_WIDTH/2, 5, 8);
            ctx.fillRect(-CAR_LENGTH/2, CAR_WIDTH/2 - 8, 5, 8);
        }

        ctx.restore();
    }
}

function drawBackground() {
    // Dark Asphalt
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, width, height);

    // Roads
    ctx.fillStyle = '#222';
    ctx.fillRect(width/2 - LANE_WIDTH, 0, LANE_WIDTH * 2, height);
    ctx.fillRect(0, height/2 - LANE_WIDTH, width, LANE_WIDTH * 2);

    // Markings
    ctx.strokeStyle = '#555';
    ctx.setLineDash([30, 30]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(width/2, 0); ctx.lineTo(width/2, height);
    ctx.moveTo(0, height/2); ctx.lineTo(width, height/2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Curbs
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.strokeRect(width/2 - LANE_WIDTH, 0, LANE_WIDTH * 2, height);
    ctx.strokeRect(0, height/2 - LANE_WIDTH, width, LANE_WIDTH * 2);
}

function handleInput(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    cars.forEach(car => {
        if (Math.hypot(car.x - x, car.y - y) < 50) {
            car.manualStop = !car.manualStop;
        }
    });
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput);

function spawn() {
    trafficDensity = parseFloat(densitySlider.value);
    if (Math.random() < trafficDensity) {
        const dir = Math.floor(Math.random() * 4);
        let x, y;
        if (dir === 0) { x = -100; y = height/2 + LANE_WIDTH/2; }
        if (dir === 1) { x = width/2 - LANE_WIDTH/2; y = -100; }
        if (dir === 2) { x = width + 100; y = height/2 - LANE_WIDTH/2; }
        if (dir === 3) { x = width/2 + LANE_WIDTH/2; y = height + 100; }

        if (!cars.some(c => Math.hypot(c.x - x, c.y - y) < 120)) {
            cars.push(new Car(x, y, dir));
        }
    }
}

function loop() {
    drawBackground();
    spawn();

    cars = cars.filter(c => {
        c.update();
        c.draw();
        return c.x > -200 && c.x < width + 200 && c.y > -200 && c.y < height + 200;
    });

    explosions.forEach((exp, i) => {
        ctx.fillStyle = `rgba(255, 50, 0, ${exp.life})`;
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, exp.r * (2 - exp.life), 0, Math.PI*2);
        ctx.fill();
        exp.life -= 0.02;
        if (exp.life <= 0) explosions.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
