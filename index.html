<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROTECT THE BOYFRIEND</title>
    <style>
        body { margin: 0; background: #2c0000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: radial-gradient(circle, #4a0000, #1a0000); }
        #ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #ff4d4d; pointer-events: none; font-weight: bold; font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="ui">SAVED FROM ANNOYANCE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let items = [];
        const player = { x: canvas.width / 2, y: canvas.height - 80, size: 60 };
        const emojis = ["🧦", "🍔", "❓", "🎮", "😴"]; // Things you do that annoy her
        
        class Item {
            constructor() {
                this.size = 50;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = -this.size;
                this.speed = 2 + Math.random() * 3;
                this.char = emojis[Math.floor(Math.random() * emojis.length)];
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.font = this.size + "px serif";
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function spawnItem() {
            if (Math.random() < 0.03) items.push(new Item());
        }

        function handleTouch(e) {
            const touch = e.touches ? e.touches[0] : e;
            const tx = touch.clientX;
            const ty = touch.clientY;

            items.forEach((item, index) => {
                const dist = Math.hypot(item.x + 25 - tx, item.y - 25 - ty);
                if (dist < 40) {
                    items.splice(index, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (navigator.vibrate) navigator.vibrate(40);
                }
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw "You" at the bottom
            ctx.font = "60px serif";
            ctx.fillText("🙇‍♂️", player.x - 30, player.y);

            spawnItem();
            items.forEach((item, index) => {
                item.update();
                item.draw();
                if (item.y > canvas.height) {
                    items.splice(index, 1);
                    // Penalize her? No, let's keep it relaxing.
                }
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('mousedown', handleTouch);
        gameLoop();
    </script>
</body>
</html>
