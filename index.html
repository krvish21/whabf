<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Boyfriend Punching Bag</title>
    <style>
        :root {
            --maroon: #4a0000;
            --bright-red: #ff3333;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            background: radial-gradient(circle, var(--maroon), #000);
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif; /* For that extra "silly" feel */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #ui {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.2rem; color: var(--bright-red); }
        #counter { font-size: 2.5rem; color: var(--gold); text-shadow: 2px 2px #000; }

        .ring {
            position: relative;
            width: 90vw;
            height: 70vh;
            background: rgba(255, 255, 255, 0.05);
            border: 5px solid var(--bright-red);
            border-radius: 30px;
            box-shadow: inset 0 0 50px #000;
        }

        #target {
            position: absolute;
            width: 100px;
            height: 100px;
            font-size: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .shake {
            animation: ultra-shake 0.1s infinite;
        }

        @keyframes ultra-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-5deg); }
            40% { transform: translate(-1px, 2px) rotate(5deg); }
            60% { transform: translate(3px, 1px) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .apology {
            position: absolute;
            color: var(--gold);
            font-weight: bold;
            font-style: italic;
            pointer-events: none;
            white-space: nowrap;
            animation: flyOff 0.6s ease-out forwards;
        }

        @keyframes flyOff {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>TAP TO PUNISH ME</h1>
        <div id="counter">0</div>
    </div>
    
    <div class="ring" id="ring">
        <div id="target">🥺</div>
    </div>

    <script>
        const target = document.getElementById('target');
        const ring = document.getElementById('ring');
        const counter = document.getElementById('counter');
        
        let score = 0;
        const faces = ["🥺", "😵‍💫", "🤡", "😱", "🙏", "🤕"];
        const quotes = [
            "I'M SORRY!", "MY FAULT!", "YOU'RE RIGHT!", 
            "HAVE MERCY!", "I'LL DO THE DISHES!", 
            "DESERVED!", "OUCHIE!", "STOP (don't stop)"
        ];

        function teleport() {
            const maxX = ring.clientWidth - 100;
            const maxY = ring.clientHeight - 100;
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = Math.random() * maxY + 'px';
            target.innerText = faces[Math.floor(Math.random() * faces.length)];
        }

        function handlePunch(e) {
            e.preventDefault();
            score++;
            counter.innerText = score;

            // Physical feedback
            if (navigator.vibrate) navigator.vibrate(80);

            // Create apology text
            const text = document.createElement('div');
            text.className = 'apology';
            text.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            text.style.left = target.style.left;
            text.style.top = target.style.top;
            ring.appendChild(text);
            setTimeout(() => text.remove(), 600);

            // Visual impact
            target.classList.add('shake');
            setTimeout(() => {
                target.classList.remove('shake');
                teleport();
            }, 100);
        }

        target.addEventListener('touchstart', handlePunch);
        target.addEventListener('mousedown', handlePunch);

        teleport(); // Initial move
    </script>
</body>
</html>
