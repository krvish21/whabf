<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Intersection Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #222;
        }
    </style>
</head>
<body>
    <canvas id="simCanvas"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 800;

const LANE_WIDTH = 60;
const CAR_WIDTH = 30;
const CAR_LENGTH = 50;
const MAX_SPEED = 2.5;
const SAFE_DISTANCE = 80; // Distance to start slowing down
const STOP_DISTANCE = 40; // Distance to full stop

const cars = [];
const explosions = [];

class Car {
    constructor(x, y, dir) {
        this.x = x;
        this.y = y;
        this.dir = dir; // 0: Right, 1: Down, 2: Left, 3: Up
        this.speed = MAX_SPEED;
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        this.width = (dir % 2 === 0) ? CAR_LENGTH : CAR_WIDTH;
        this.height = (dir % 2 === 0) ? CAR_WIDTH : CAR_LENGTH;
        this.isBraking = false;
        this.isCrashed = false;
    }

    getBounds() {
        return {
            left: this.x - this.width / 2,
            right: this.x + this.width / 2,
            top: this.y - this.height / 2,
            bottom: this.y + this.height / 2
        };
    }

    update(allCars) {
        if (this.isCrashed) return;

        let closestDist = Infinity;
        this.isBraking = false;

        allCars.forEach(other => {
            if (other === this || other.isCrashed) return;

            // Simple "Smart" AI: Check distance to cars ahead in the same path or intersection
            let dist = Infinity;
            if (this.dir === 0 && other.x > this.x && Math.abs(other.y - this.y) < LANE_WIDTH) dist = other.x - this.x;
            if (this.dir === 1 && other.y > this.y && Math.abs(other.x - this.x) < LANE_WIDTH) dist = other.y - this.y;
            if (this.dir === 2 && other.x < this.x && Math.abs(other.y - this.y) < LANE_WIDTH) dist = this.x - other.x;
            if (this.dir === 3 && other.y < this.y && Math.abs(other.x - this.x) < LANE_WIDTH) dist = this.y - other.y;

            if (dist < closestDist) closestDist = dist;
        });

        // Speed Control
        if (closestDist < STOP_DISTANCE) {
            this.speed = 0;
            this.isBraking = true;
        } else if (closestDist < SAFE_DISTANCE) {
            this.speed = MAX_SPEED * 0.3;
            this.isBraking = true;
        } else {
            this.speed = Math.min(MAX_SPEED, this.speed + 0.1);
        }

        // Move
        if (this.dir === 0) this.x += this.speed;
        if (this.dir === 1) this.y += this.speed;
        if (this.dir === 2) this.x -= this.speed;
        if (this.dir === 3) this.y -= this.speed;

        // Collision Check
        allCars.forEach(other => {
            if (other === this || this.isCrashed) return;
            const b1 = this.getBounds();
            const b2 = other.getBounds();
            if (!(b1.right < b2.left || b1.left > b2.right || b1.bottom < b2.top || b1.top > b2.bottom)) {
                this.isCrashed = true;
                other.isCrashed = true;
                explosions.push({x: this.x, y: this.y, timer: 30});
            }
        });
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Headlights
        if (!this.isCrashed) {
            ctx.beginPath();
            const gradient = ctx.createRadialGradient(0, 0, 10, 0, 0, 150);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
            ctx.fillStyle = gradient;
            
            let angle = (this.dir * Math.PI) / 2;
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, 150, angle - 0.4, angle + 0.4);
            ctx.fill();
        }

        // Car Body
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

        // Brake Lights
        ctx.fillStyle = this.isBraking ? '#ff0000' : '#550000';
        if (this.dir === 0) ctx.fillRect(-this.width/2, -this.height/2, 4, this.height);
        if (this.dir === 1) ctx.fillRect(-this.width/2, -this.height/2, this.width, 4);
        if (this.dir === 2) ctx.fillRect(this.width/2 - 4, -this.height/2, 4, this.height);
        if (this.dir === 3) ctx.fillRect(-this.width/2, this.height/2 - 4, this.width, 4);

        ctx.restore();
    }
}

function drawRoad() {
    ctx.fillStyle = '#333'; // Asphalt
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#444';
    ctx.fillRect(canvas.width/2 - LANE_WIDTH, 0, LANE_WIDTH * 2, canvas.height);
    ctx.fillRect(0, canvas.height/2 - LANE_WIDTH, canvas.width, LANE_WIDTH * 2);

    // Markings
    ctx.strokeStyle = '#fff';
    ctx.setLineDash([20, 20]);
    ctx.lineWidth = 2;
    
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke();
    ctx.setLineDash([]);
}

function spawnCar() {
    const dir = Math.floor(Math.random() * 4);
    let x, y;
    const offset = LANE_WIDTH / 2;

    if (dir === 0) { x = -50; y = canvas.height/2 + offset; }
    if (dir === 1) { x = canvas.width/2 - offset; y = -50; }
    if (dir === 2) { x = canvas.width + 50; y = canvas.height/2 - offset; }
    if (dir === 3) { x = canvas.width/2 + offset; y = canvas.height + 50; }

    // Prevent spawning on top of another car
    const conflict = cars.some(c => Math.hypot(c.x - x, c.y - y) < 100);
    if (!conflict) cars.push(new Car(x, y, dir));
}

function animate() {
    drawRoad();

    if (Math.random() < 0.03) spawnCar();

    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update(cars);
        cars[i].draw();
        
        // Cleanup off-screen
        if (cars[i].x < -100 || cars[i].x > canvas.width + 100 || 
            cars[i].y < -100 || cars[i].y > canvas.height + 100) {
            cars.splice(i, 1);
        }
    }

    // Draw explosions
    explosions.forEach((exp, index) => {
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, 20 + Math.random() * 10, 0, Math.PI * 2);
        ctx.fill();
        exp.timer--;
        if (exp.timer <= 0) explosions.splice(index, 1);
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
